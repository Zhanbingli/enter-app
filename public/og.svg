<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="paper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7f0e7" />
      <stop offset="100%" stop-color="#efe1d1" />
    </linearGradient>
    <radialGradient id="warm" cx="20%" cy="10%" r="40%">
      <stop offset="0%" stop-color="#fffaf2" stop-opacity="0.92" />
      <stop offset="100%" stop-color="#fffaf2" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="tide" cx="76%" cy="14%" r="35%">
      <stop offset="0%" stop-color="#6f929b" stop-opacity="0.20" />
      <stop offset="100%" stop-color="#6f929b" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="moss" cx="80%" cy="86%" r="35%">
      <stop offset="0%" stop-color="#7f9571" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#7f9571" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#paper)" />
  <rect width="1200" height="630" fill="url(#warm)" />
  <rect width="1200" height="630" fill="url(#tide)" />
  <rect width="1200" height="630" fill="url(#moss)" />

  <!-- Wordmark -->
  <text x="84" y="106" font-family="Lora, Georgia, serif" font-size="22"
        font-weight="500" fill="#5f4a3d" letter-spacing="6"
        text-transform="uppercase">MOOD ROOM</text>

  <!-- A small kettle-warm accent rule -->
  <rect x="84" y="128" width="60" height="2" fill="#c98263" rx="1" />

  <!-- Headline -->
  <text x="84" y="320" font-family="Lora, Georgia, serif" font-size="92"
        font-weight="600" fill="#2f2b27">What kind</text>
  <text x="84" y="412" font-family="Lora, Georgia, serif" font-size="92"
        font-weight="600" fill="#2f2b27">of boredom</text>
  <text x="84" y="504" font-family="Lora, Georgia, serif" font-size="92"
        font-weight="600" fill="#2f2b27">is this?</text>

  <!-- Subtitle -->
  <text x="84" y="568" font-family="Lora, Georgia, serif" font-size="26"
        font-style="italic" fill="#5f4a3d" opacity="0.78">a quiet place to land for five minutes.</text>

  <!-- Bottom-right tag -->
  <text x="1116" y="586" font-family="Lora, Georgia, serif" font-size="18"
        fill="#5f4a3d" opacity="0.5" text-anchor="end" letter-spacing="3">no scrolling required.</text>
</svg>
