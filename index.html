<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="A quiet place to land for five minutes — when you're bored but don't want to scroll. Two people talking in a room you don't have to be in."
    />
    <meta name="theme-color" content="#f7f0e7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1815" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Mood Room" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- OpenGraph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="What kind of boredom is this?" />
    <meta
      property="og:description"
      content="A quiet place to land for five minutes. Two people talking in a room you don't have to be in."
    />
    <meta property="og:site_name" content="Mood Room" />
    <meta property="og:image" content="/og.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="What kind of boredom is this?" />
    <meta
      name="twitter:description"
      content="A quiet place to land for five minutes. Two people talking in a room you don't have to be in."
    />
    <meta name="twitter:image" content="/og.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <title>What kind of boredom is this?</title>
    <style>
      /* Critical inline styles — applied before the main CSS bundle loads
         so the first paint is the paper color, not a white flash. */
      html, body { margin: 0; background: #f7f0e7; color: #2f2b27; min-height: 100vh; }
      @media (prefers-color-scheme: dark) {
        html, body { background: #1a1815; color: #e8e2d7; }
      }
      html[data-late] body { background: #1a1815; color: #e8e2d7; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
